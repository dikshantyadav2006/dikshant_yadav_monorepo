name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run generate:prisma

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build

  migrate:
    name: Prisma Migration
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma migrate deploy --schema packages/database/prisma/schema.prisma

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Vercel frontend deployments
        run: |
          curl -fsS -X POST "${{ secrets.VERCEL_MAIN_WEB_DEPLOY_HOOK }}"
          curl -fsS -X POST "${{ secrets.VERCEL_POST_WEB_DEPLOY_HOOK }}"
          curl -fsS -X POST "${{ secrets.VERCEL_ADMIN_WEB_DEPLOY_HOOK }}"

      - name: Trigger Render backend deployment
        run: curl -fsS -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}"
