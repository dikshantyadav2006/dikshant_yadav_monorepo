    <style>
      #loader {
        position: fixed; inset: 0; z-index: 999999;
        display: flex; align-items: center; justify-content: center;
        background: #091223;
        color: #c9e7e7;
        font-family: system-ui, sans-serif;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #loader.hidden {
        opacity: 0; visibility: hidden; pointer-events: none;
      }
      #loader span {
        font-size: 2rem; font-weight: 700; letter-spacing: 0.15em;
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: .3; transform: scale(.95); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="loader"><span>hello@dikshantyadav.in</span></div>
    <div id="root"></div>
    <script>
      window.removeLoader = () => document.getElementById('loader').classList.add('hidden');
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
