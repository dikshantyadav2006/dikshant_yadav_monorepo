services:
  - type: web
    name: dikshant-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:api
    startCommand: npm run start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_DOMAIN
        value: .dikshantyadav.in
